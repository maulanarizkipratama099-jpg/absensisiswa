<!DOCTYPE html>
<html>
<head>
    <title>Test Koneksi Database</title>
</head>
<body>
    <h1>Test Koneksi Google Sheets</h1>
    <div id="status"></div>
    <button onclick="testConnection()">Test Koneksi</button>
    <button onclick="testSave()">Test Simpan Data</button>

    <script>
        // GANTI DENGAN URL APPS SCRIPT ANDA!
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzVktpYAJ1ySdozpgTNtIXzg5uzJ6ypFeq5gusEzbDXqaTJ3TnppwCAi2LOrRL8yfwl/exec';

        async function testConnection() {
            try {
                const response = await fetch(APPS_SCRIPT_URL + '?action=getConfig');
                const result = await response.json();
                document.getElementById('status').innerHTML = 
                    '<p style="color:green">✅ Koneksi berhasil! Response: ' + JSON.stringify(result) + '</p>';
            } catch (error) {
                document.getElementById('status').innerHTML = 
                    '<p style="color:red">❌ Error: ' + error.message + '</p>';
            }
        }

        async function testSave() {
            try {
                const testData = ['test_id', '12345', 'Test Siswa', 'X IPA', 'IPA', '', '2024/2025', Date.now()];
                
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'save',
                        sheet: 'siswa',
                        data: testData
                    })
                });
                
                const result = await response.json();
                document.getElementById('status').innerHTML = 
                    '<p style="color:green">✅ Data tersimpan! Response: ' + JSON.stringify(result) + '</p>';
            } catch (error) {
                document.getElementById('status').innerHTML = 
                    '<p style="color:red">❌ Error: ' + error.message + '</p>';
            }
        }
    </script>
</body>
</html>
