                if (!response.ok) {

                }
                
                const data = await response.json();
                return data.values || [];
            } catch (error) {
                console.error(`❌ Gagal fetch ${sheetName}:`, error);
                return [];
            }
        }

        async function updateSheetData(sheetName, values, range = "A:Z") {

                console.log(`📤 Menyimpan ${sheetName} ke localStorage (backup)...`);

        // Fungsi untuk mengkonversi array ke object berdasarkan header
        function arrayToObjects(rows, requiredColumns = []) {
            if (!rows || rows.length < 2) return [];
            
            const headers = rows[0];
            const data = [];
            
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (row.length === 0 || (row.length === 1 && row[0] === '')) continue;
                
                const obj = {};
                headers.forEach((header, index) => {
                    if (header && header.trim()) {
                        obj[header.trim()] = row[index] || '';
                    }
                });
                
                // Parse tipe data khusus
                if (obj.created_at && !isNaN(obj.created_at)) obj.created_at = parseInt(obj.created_at);
                if (obj.timestamp && !isNaN(obj.timestamp)) obj.timestamp = parseInt(obj.timestamp);
                if (obj.updated_at && !isNaN(obj.updated_at)) obj.updated_at = parseInt(obj.updated_at);
                if (obj.poin && !isNaN(obj.poin)) obj.poin = parseInt(obj.poin);
                if (obj.lat && !isNaN(obj.lat)) obj.lat = parseFloat(obj.lat);
                if (obj.lng && !isNaN(obj.lng)) obj.lng = parseFloat(obj.lng);
                if (obj.accuracy && !isNaN(obj.accuracy)) obj.accuracy = parseFloat(obj.accuracy);
                if (obj.within_radius) obj.within_radius = obj.within_radius === 'true' || obj.within_radius === 'TRUE';
                if (obj.distance && !isNaN(obj.distance)) obj.distance = parseInt(obj.distance);
                
                // Parse location object untuk attendance
                if (obj.location_lat && obj.location_lng) {
                    obj.location = {
                        lat: parseFloat(obj.location_lat),
                        lng: parseFloat(obj.location_lng),
                        accuracy: parseFloat(obj.location_accuracy || 0),
                        timestamp: obj.timestamp || Date.now()
                    };
                    delete obj.location_lat;
                    delete obj.location_lng;
                    delete obj.location_accuracy;
                }
                
                data.push(obj);
            }
            
            return data;
        }

        // Fungsi untuk mengkonversi object ke array untuk sheet
        function objectsToArray(objects, headers) {
            const rows = [headers];
            
            objects.forEach(obj => {
                const row = headers.map(header => {
                    // Handle special cases
                    if (header === 'location_lat' && obj.location) return obj.location.lat || '';
                    if (header === 'location_lng' && obj.location) return obj.location.lng || '';
                    if (header === 'location_accuracy' && obj.location) return obj.location.accuracy || '';
                    
                    // Handle nested object location
                    if (header.startsWith('location_')) return '';
                    
                    return obj[header] !== undefined ? obj[header] : '';
                });
                rows.push(row);
            });
            
            return rows;
        }

        // ==================== FUNGSI GOOGLE DRIVE UNTUK FOTO ====================
        function extractGoogleDriveFileId(url) {
            if (!url) return null;
            
            const patterns = [
                /\/file\/d\/([^\/?#]+)/,
                /\/open\?id=([^&?#]+)/,
                /\/uc\?id=([^&?#]+)/,
                /\/d\/([^\/?#]+)/,
                /id=([^&?#]+)/
            ];
            
            for (let pattern of patterns) {
                const match = url.match(pattern);
                if (match && match[1]) {
                    return match[1];
                }
            }
            
            return null;
        }

        function getGoogleDriveThumbnail(fileId) {
            return `https://drive.google.com/thumbnail?id=${fileId}&sz=w400-h400`;
        }

        function convertGoogleDriveLink(link) {
            if (!link) return '';
            
            const fileId = extractGoogleDriveFileId(link);
            if (!fileId) return link;
            
            return getGoogleDriveThumbnail(fileId);
        }

        async function testGoogleDriveLink(link) {
            return new Promise((resolve) => {
                const fileId = extractGoogleDriveFileId(link);
                if (!fileId) {
                    resolve(false);
                    return;
                }
                
                const img = new Image();
                let timeout = setTimeout(() => {
                    img.src = '';
                    resolve(false);
                }, 5000);
                
                img.onload = () => {
                    clearTimeout(timeout);
                    resolve(true);
                };
                
                img.onerror = () => {
                    clearTimeout(timeout);
                    resolve(false);
                };
                
                img.src = getGoogleDriveThumbnail(fileId);
            });
        }

        function compressImage(file, maxWidth = 800, maxHeight = 800, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height) {
                            if (width > maxWidth) {
                                height *= maxWidth / width;
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width *= maxHeight / height;
                                height = maxHeight;
                            }
                        }
                        
                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        canvas.toBlob((blob) => {
                            const compressedFile = new File([blob], file.name, {
                                type: 'image/jpeg',
                                lastModified: Date.now()
                            });
                            
                            const compressedReader = new FileReader();
                            compressedReader.readAsDataURL(compressedFile);
                            compressedReader.onload = () => {
                                console.log(`📸 Kompresi: ${(file.size/1024).toFixed(2)}KB → ${(blob.size/1024).toFixed(2)}KB`);
                                resolve(compressedReader.result);
                            };
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });

        function formatDate(date) {
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');

        // ==================== FUNGSI LOKASI ====================
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                    Math.cos(φ1) * Math.cos(φ2) *
                    Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c;
        }

        function isWithinSchoolRadius(lat, lng) {
            const distance = calculateDistance(lat, lng, SCHOOL_LOCATION.lat, SCHOOL_LOCATION.lng);
            return distance <= SCHOOL_LOCATION.radius;
        }

        function getLocationStatus(lat, lng) {
            if (!lat || !lng) return { status: 'unknown', text: 'Tidak diketahui', class: '' };
            
            const distance = calculateDistance(lat, lng, SCHOOL_LOCATION.lat, SCHOOL_LOCATION.lng);
            const withinRadius = distance <= SCHOOL_LOCATION.radius;
            
            return {
                status: withinRadius ? 'within' : 'outside',
                text: withinRadius ? `Dalam radius (${Math.round(distance)}m)` : `Luar radius (${Math.round(distance)}m)`,
                class: withinRadius ? 'location-badge' : 'location-badge outside',
                distance: Math.round(distance)
            };
        }

        function renderLokasiTable() {
            const tbody = document.getElementById('lokasiTableBody');
            if (!tbody) return;
            
            const withLocation = attendanceRecords.filter(r => r.location);
            
            if (withLocation.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-12 text-gray-500">Belum ada data lokasi</td></tr>';
                return;
            }
            
            const dalamRadius = withLocation.filter(r => r.location && isWithinSchoolRadius(r.location.lat, r.location.lng)).length;
            const luarRadius = withLocation.filter(r => r.location && !isWithinSchoolRadius(r.location.lat, r.location.lng)).length;
            const tanpaLokasi = attendanceRecords.filter(r => !r.location).length;
            
            document.getElementById('statDalamRadius').textContent = dalamRadius;
            document.getElementById('statLuarRadius').textContent = luarRadius;
            document.getElementById('statTanpaLokasi').textContent = tanpaLokasi;
            
            const sorted = [...withLocation].sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal));
            
            tbody.innerHTML = sorted.map(record => {
                const locStatus = record.location ? 
                    getLocationStatus(record.location.lat, record.location.lng) : 
                    { text: 'Tidak ada data', class: '' };
                
                return `
                    <tr>
                        <td class="px-4 py-4">${formatDateID(record.tanggal)}</td>
                        <td class="px-4 py-4 font-medium">${record.student_nama}</td>
                        <td class="px-4 py-4"><span class="px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-xs">${record.student_kelas}</span></td>
                        <td class="px-4 py-4">
                            <span class="status-badge ${record.status === 'hadir' ? 'hadir' : record.status === 'pulang' ? 'pulang' : record.status}">${record.status === 'pulang' ? 'PULANG' : record.status.toUpperCase()}</span>
                        </td>
                        <td class="px-4 py-4">
                            ${record.location ? `
                                <div class="text-xs">
                                    <div class="font-mono">${record.location.lat.toFixed(6)}, ${record.location.lng.toFixed(6)}</div>
                                    <div class="text-gray-500 mt-1">Akurasi: ±${Math.round(record.location.accuracy)}m</div>
                                </div>
                            ` : '-'}
                        </td>
                        <td class="px-4 py-4">
                            ${record.location ? 
                                `<span class="${locStatus.class}">${locStatus.text}</span>` : 
                                '<span class="text-gray-400">-</span>'
                            }
                        </td>
                    </tr>
                `;
            }).join('');
        }
